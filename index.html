  '<script src="https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SiteAssets/carousel/carousel-data.js?v=' + v + '"><\/script>'

  '<script src="./app.js?v=' + v + '"><\/script>'

</html>
